<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clínica SaaS - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-2">Clínica SaaS</h1>
    <p class="text-gray-600 text-center mb-6">Entre com suas credenciais para acessar o sistema</p>
    
    <div id="error" class="hidden p-3 text-sm text-red-600 bg-red-50 rounded-md mb-4"></div>
    
    <form id="loginForm" class="space-y-4">
      <div class="space-y-2">
        <label for="email" class="text-sm font-medium">Email</label>
        <input
          id="email"
          type="email"
          class="w-full px-3 py-2 border rounded-md"
          placeholder="seu@email.com"
          required
        />
      </div>
      <div class="space-y-2">
        <label for="password" class="text-sm font-medium">Senha</label>
        <input
          id="password"
          type="password"
          class="w-full px-3 py-2 border rounded-md"
          placeholder="••••••••"
          required
        />
      </div>
      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 disabled:opacity-50"
      >
        Entrar
      </button>
      <div class="text-center text-sm">
        <a href="/forgot-password" class="text-blue-600 hover:underline">Esqueceu a senha?</a>
      </div>
    </form>
  </div>

  <script>
    const API_URL = 'http://localhost:3001/api/v1';
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorDiv = document.getElementById('error');
      const btn = e.target.querySelector('button');
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      errorDiv.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Entrando...';
      
      try {
        const res = await fetch(API_URL + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.message || 'Login falhou');
        }
        
        localStorage.setItem('accessToken', data.accessToken);
        localStorage.setItem('refreshToken', data.refreshToken);
        localStorage.setItem('user', JSON.stringify(data.user));
        
        window.location.href = '/dashboard';
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
