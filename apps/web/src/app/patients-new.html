<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Paciente - Clínica SaaS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="app">
    <main class="max-w-4xl mx-auto p-8">
      <div class="mb-6">
        <a href="/patients.html" class="text-blue-600 hover:underline">← Voltar para Pacientes</a>
      </div>

      <div class="bg-white rounded-lg shadow p-8">
        <h2 class="text-2xl font-bold mb-6">Novo Paciente</h2>

        <form @submit.prevent="savePatient">
          <div class="grid grid-cols-2 gap-6 mb-6">
            <div>
              <label class="block text-sm font-medium mb-2">Nome *</label>
              <input v-model="form.name" type="text" required class="w-full px-4 py-2 border rounded">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Email</label>
              <input v-model="form.email" type="email" class="w-full px-4 py-2 border rounded">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Telefone</label>
              <input v-model="form.phone" type="text" class="w-full px-4 py-2 border rounded" placeholder="11999999999">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">CPF</label>
              <input v-model="form.document" type="text" class="w-full px-4 py-2 border rounded" placeholder="12345678900">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Data de Nascimento</label>
              <input v-model="form.birthDate" type="date" class="w-full px-4 py-2 border rounded">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Gênero</label>
              <select v-model="form.gender" class="w-full px-4 py-2 border rounded">
                <option value="">Selecione</option>
                <option value="male">Masculino</option>
                <option value="female">Feminino</option>
                <option value="other">Outro</option>
              </select>
            </div>
          </div>

          <h3 class="text-lg font-semibold mb-4">Endereço</h3>
          <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="col-span-2">
              <label class="block text-sm font-medium mb-2">Rua</label>
              <input v-model="form.addressStreet" type="text" class="w-full px-4 py-2 border rounded">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Número</label>
              <input v-model="form.addressNumber" type="text" class="w-full px-4 py-2 border rounded">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Complemento</label>
              <input v-model="form.addressComplement" type="text" class="w-full px-4 py-2 border rounded">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Bairro</label>
              <input v-model="form.addressDistrict" type="text" class="w-full px-4 py-2 border rounded">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Cidade</label>
              <input v-model="form.addressCity" type="text" class="w-full px-4 py-2 border rounded">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">Estado</label>
              <input v-model="form.addressState" type="text" class="w-full px-4 py-2 border rounded">
            </div>
            <div>
              <label class="block text-sm font-medium mb-2">CEP</label>
              <input v-model="form.addressZipCode" type="text" class="w-full px-4 py-2 border rounded">
            </div>
          </div>

          <div class="mb-6">
            <label class="block text-sm font-medium mb-2">Observações</label>
            <textarea v-model="form.notes" rows="3" class="w-full px-4 py-2 border rounded"></textarea>
          </div>

          <div class="mb-6">
            <label class="block text-sm font-medium mb-2">Tags (separadas por vírgula)</label>
            <input v-model="tagsInput" type="text" class="w-full px-4 py-2 border rounded" placeholder="prioridade, retorno">
          </div>

          <h3 class="text-lg font-semibold mb-4">Contatos</h3>
          <div v-for="(contact, index) in form.contacts" :key="index" class="grid grid-cols-5 gap-4 mb-4 p-4 bg-gray-50 rounded">
            <div class="col-span-2">
              <label class="block text-xs text-gray-500 mb-1">Nome</label>
              <input v-model="contact.name" type="text" class="w-full px-3 py-2 border rounded">
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Parentesco</label>
              <input v-model="contact.relationship" type="text" class="w-full px-3 py-2 border rounded">
            </div>
            <div>
              <label class="block text-xs text-gray-500 mb-1">Telefone</label>
              <input v-model="contact.phone" type="text" class="w-full px-3 py-2 border rounded">
            </div>
            <div class="flex items-end gap-2">
              <label class="flex items-center">
                <input v-model="contact.isPrimary" type="checkbox" class="mr-1"> Principal
              </label>
              <button type="button" @click="removeContact(index)" class="text-red-600 hover:text-red-800">✕</button>
            </div>
          </div>
          <button type="button" @click="addContact" class="text-blue-600 hover:underline mb-6">+ Adicionar Contato</button>

          <div class="flex gap-4">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
              Salvar
            </button>
            <a href="/patients.html" class="px-6 py-2 border rounded">Cancelar</a>
          </div>

          <div v-if="error" class="mt-4 p-4 bg-red-100 text-red-700 rounded">{{ error }}</div>
          <div v-if="success" class="mt-4 p-4 bg-green-100 text-green-700 rounded">{{ success }}</div>
        </form>
      </div>
    </main>
  </div>

  <script>
    const { createApp, ref } = Vue;

    createApp({
      setup() {
        const API_URL = 'http://localhost:3001/api/v1';
        const accessToken = localStorage.getItem('accessToken');
        const error = ref('');
        const success = ref('');
        const tagsInput = ref('');

        const form = ref({
          name: '',
          email: '',
          phone: '',
          document: '',
          birthDate: '',
          gender: '',
          addressStreet: '',
          addressNumber: '',
          addressComplement: '',
          addressDistrict: '',
          addressCity: '',
          addressState: '',
          addressZipCode: '',
          notes: '',
          contacts: []
        });

        const addContact = () => {
          form.value.contacts.push({ name: '', relationship: '', phone: '', isPrimary: false });
        };

        const removeContact = (index) => {
          form.value.contacts.splice(index, 1);
        };

        const savePatient = async () => {
          error.value = '';
          success.value = '';

          if (!accessToken) {
            window.location.href = '/login.html';
            return;
          }

          try {
            const payload = { ...form.value };
            if (tagsInput.value) {
              payload.tags = tagsInput.value.split(',').map(t => t.trim()).filter(t => t);
            }
            if (payload.birthDate) {
              payload.birthDate = new Date(payload.birthDate).toISOString();
            }

            const res = await fetch(API_URL + '/patients', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + accessToken,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify(payload)
            });

            if (!res.ok) {
              const data = await res.json();
              throw new Error(data.message || 'Erro ao salvar paciente');
            }

            const data = await res.json();
            success.value = 'Paciente salvo com sucesso!';
            setTimeout(() => {
              window.location.href = '/patients.html';
            }, 1500);
          } catch (e) {
            error.value = e.message;
          }
        };

        return { form, error, success, tagsInput, addContact, removeContact, savePatient };
      }
    }).mount('#app');
  </script>
</body>
</html>
